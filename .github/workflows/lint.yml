name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  flake8:
    name: flake8
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 modules/ \
            --max-line-length=120 \
            --exclude=modules/*/build,modules/*/dist,modules/*/*.egg-info \
            --extend-ignore=E501,W503
